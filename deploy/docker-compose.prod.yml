services:
  sucmul_db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sucursales_multiplataforma
      POSTGRES_USER: sucmul_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sucmul_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sucmul_user -d sucursales_multiplataforma"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  sucmul_backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile.prod
    environment:
      PORT: 3012
      NODE_ENV: production
      DATABASE_URL: postgresql://sucmul_user:${POSTGRES_PASSWORD}@sucmul_db:5432/sucursales_multiplataforma?schema=public
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 1d
      UPLOAD_DIR: uploads
      APP_URL: https://www.rutasingluten.lat
      FRONTEND_URL: https://rutasingluten.lat
    depends_on:
      sucmul_db:
        condition: service_healthy
    volumes:
      - sucmul_uploads:/app/backend/uploads
    networks:
      - default
      - edge
    restart: unless-stopped

  sucmul_frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile.prod
      args:
        VITE_API_URL: /suc-mul/api
        VITE_APP_BASE_PATH: /suc-mul/
    networks:
      - edge
    restart: unless-stopped

networks:
  edge:
    external: true
    name: compose_default

volumes:
  sucmul_postgres_data:
  sucmul_uploads:
